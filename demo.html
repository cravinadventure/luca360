<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCA360° — Demo Mode</title>
<link href="https://fonts.cdnfonts.com/css/gilroy-bold" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #000; color: #f5f5f7;
  font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── GOOGLE MAPS STREET VIEW ── */
.streetview {
  position: fixed; inset: 0; z-index: 0;
}
.streetview iframe {
  width: 100%; height: 100%; border: none;
}

/* ── CENTER BRANDING ── */
.branding {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.brand-name {
  font-size: 3rem; font-weight: 800; letter-spacing: -.02em;
  text-shadow: 0 2px 20px rgba(0,0,0,.7);
}
.brand-slogan {
  font-size: 1rem; font-weight: 400; letter-spacing: .02em;
  color: rgba(255,255,255,.75);
  margin-top: .4rem;
  text-shadow: 0 1px 10px rgba(0,0,0,.7);
}

/* ── BOTTOM CTA ── */
.bottom-cta {
  position: fixed; bottom: 4rem; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: center;
  pointer-events: none;
}
.exit-btn {
  padding: .55rem 1.6rem;
  background: #f5f5f7; color: #000;
  font-family: inherit; font-size: .8rem; font-weight: 500;
  border: none; border-radius: 100px;
  text-decoration: none; cursor: pointer; transition: background .2s;
  pointer-events: auto;
}
.exit-btn:hover { background: #c9863a; }
</style>
</head>
<body>

<!-- FULLSCREEN GOOGLE STREET VIEW -->
<div class="streetview">
  <iframe
    src="https://www.google.com/maps/embed?pb=!4v1700000000000!6m8!1m7!1sCAoSFkNJSE0wb2dLRUlDQWdJRDR5ci1nc0E%3D!2m2!1d40.74237887273378!2d-74.00494965299438!3f180!4f10!5f0.7820865974627469"
    allowfullscreen
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<!-- CENTER BRANDING -->
<div class="branding">
  <div class="brand-name">LUCA360°</div>
  <div class="brand-slogan">Immersive tours for every space.</div>
</div>

<!-- BOTTOM EXIT BUTTON -->
<div class="bottom-cta">
  <a class="exit-btn" href="index.html">Exit Demo Mode</a>
</div>

</body>
</html>
