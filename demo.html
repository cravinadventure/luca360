<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCA360° — Demo Mode</title>
<link href="https://fonts.cdnfonts.com/css/gilroy-bold" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #000; color: #f5f5f7;
  font-family: 'Gilroy', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── GOOGLE MAPS STREET VIEW ── */
.streetview {
  position: fixed; inset: 0; z-index: 0;
}
.streetview iframe {
  width: 100%; height: 100%; border: none;
}

/* ── BOTTOM CTA ── */
.bottom-cta {
  position: fixed; bottom: 5.5rem; left: 0; right: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  pointer-events: none;
}
.bottom-brand {
  font-size: 1.1rem; font-weight: 700; letter-spacing: -.01em;
  color: #fff; text-shadow: 0 1px 8px rgba(0,0,0,.5);
}
.exit-btn {
  padding: .55rem 1.6rem;
  background: #38bdf8; color: #000;
  font-family: inherit; font-size: .8rem; font-weight: 600;
  border: none; border-radius: 100px;
  text-decoration: none; cursor: pointer; transition: background .2s;
  letter-spacing: .03em; text-transform: uppercase;
  pointer-events: auto;
}
.exit-btn:hover { background: #7dd3fc; }
</style>
</head>
<body>

<!-- FULLSCREEN GOOGLE STREET VIEW -->
<div class="streetview">
  <iframe
    src="https://www.google.com/maps/embed?pb=!4v1700000000000!6m8!1m7!1sCAoSFkNJSE0wb2dLRUlDQWdJRDR5cmZhUUE%3D!2m2!1d40.7422653!2d-74.0049731!3f119!4f-5!5f0.4"
    allowfullscreen
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<!-- BOTTOM EXIT BUTTON -->
<div class="bottom-cta">
  <div class="bottom-brand">LUCA360°</div>
  <a class="exit-btn" href="index.html">EXIT LIVE DEMO</a>
</div>

</body>
</html>
